<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BITEME. - Sklep</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product button {
      background: black;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 16px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 450px;
      margin: 80px auto;
      padding: 25px;
      border-radius: 15px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 28px;
      cursor: pointer;
      color: #333;
    }

    .close:hover {
      color: red;
    }
  </style>
</head>

<body>

<header>
  <h1>BITEME.</h1>
  <div>Koszyk: <span id="cart-count">0</span> | Suma: <span id="cart-total">0</span> zł</div>
  <button onclick="openCart()">Koszyk 🛒</button>
</header>

<div class="container">
  <div class="product">
    <h3>Paznokcie</h3>
    <p>100 zł</p>
    <button onclick="addToCart(100, 'Paznokcie')">Dodaj</button>
  </div>

  <div class="product">
    <h3>Paznokcie</h3>
    <p>120 zł</p>
    <button onclick="addToCart(120, 'Paznokcie')">Dodaj</button>
  </div>

  <div class="product">
    <h3>Zestaw do aplikacji</h3>
    <p>30 zł</p>
    <button onclick="addToCart(30, 'Zestaw do aplikacji')">Dodaj</button>
  </div>
</div>

<!-- MODAL KOSZYKA -->
<div id="cart-modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCart()">×</span>
    <h2>Twój koszyk 🛒</h2>
    <div id="cart-items-list"></div>
    <hr>
    <p><strong>Suma: <span id="modal-total">0</span> zł</strong></p>
    
    <button onclick="goToPayment()" style="background:#28a745; color:white; width:100%; padding:12px; margin:8px 0;">Przejdź do płatności →</button>
    <button onclick="clearCart()" style="background:red; color:white; width:100%;">Wyczyść koszyk</button>
  </div>
</div>

<script>
let cart = [];

function addToCart(price, name) {
  cart.push({ price, name });
  updateCart();
}

function updateCart() {
  let total = cart.reduce((sum, item) => sum + item.price, 0);
  let list = "";

  cart.forEach((item, index) => {
    list += `
      <p>
        ${item.name} - ${item.price} zł
        <button onclick="removeFromCart(${index})" style="float:right; background:red; color:white; border:none; padding:2px 8px;">Usuń</button>
      </p>`;
  });

  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("cart-total").innerText = total;
  document.getElementById("modal-total").innerText = total;
  document.getElementById("cart-items-list").innerHTML = list || "<p>Koszyk jest pusty.</p>";
}

function removeFromCart(index) {
  cart.splice(index, 1);
  updateCart();
}

function clearCart() {
  if (confirm("Czy na pewno chcesz wyczyścić cały koszyk?")) {
    cart = [];
    updateCart();
    closeCart();
  }
}

function openCart() {
  document.getElementById("cart-modal").style.display = "block";
}

function closeCart() {
  document.getElementById("cart-modal").style.display = "none";
}

function goToPayment() {
  if (cart.length === 0) {
    alert("Koszyk jest pusty!");
    return;
  }
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  alert(`Przechodzisz do płatności.\nDo zapłaty: ${total} zł`);
}

// Zamknięcie modalu po kliknięciu w tło
document.getElementById("cart-modal").addEventListener('click', function(e) {
  if (e.target === this) closeCart();
});
</script>

</body>
</html>
